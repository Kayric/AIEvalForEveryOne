<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Evals for Everyone - Interactive Guide</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d2c54', // Main dark blue text
                        secondary: '#006fff', // Blue for links/accents
                        accent: '#11d399', // Green for chart/graphic accents
                        softgray: '#DCE3ED', // Soft gray for visuals/backgrounds
                        bg: '#ffffff', // Pure white for open layout
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg font-sans h-screen flex overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full bg-primary text-white z-50 flex items-center justify-between p-4 shadow-md">
        <h1 class="font-bold text-lg">AI Evals for Everyone</h1>
        <button id="mobile-menu-btn" class="text-2xl p-1 focus:outline-none">
            <i class="ph ph-list"></i>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="transform -translate-x-full md:translate-x-0 transition-transform duration-300 fixed md:relative z-40 w-64 h-full bg-softgray/20 text-primary flex flex-col border-r border-softgray pt-16 md:pt-0">
        <div class="p-6 border-b border-softgray hidden md:block">
            <h1 class="font-bold text-xl text-primary">AI Evals <br>
            <span class="text-secondary">For Everyone</span></h1>
            <p class="text-xs text-primary/70 mt-1">Interactive Course Companion</p>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4" id="nav-container">
            <!-- Nav items injected via JS -->
        </nav>

        <div class="p-4 border-t border-softgray bg-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary font-bold">SPS</div>
                <div>
                    <p class="text-sm text-primary font-bold">Your Progress</p>
                    <div class="w-full bg-softgray rounded-full h-1.5 mt-1 w-24">
                        <div id="progress-bar" class="bg-secondary h-1.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto relative w-full pt-16 md:pt-0" id="main-content">
        <!-- Content injected via JS -->
    </main>

    <!-- Overlay for mobile sidebar -->
    <div id="overlay" class="fixed inset-0 bg-primary/20 z-30 hidden md:hidden backdrop-blur-sm"></div>

    <!-- Data and Application Logic Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
